name: Node CI

on:
  push:
    branches: [ "main", "edit-auth" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: |
          node server.js &
          sleep 3
          curl http://localhost:5173 || exit 1
